<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Players — Game Enclave</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090f;color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh}
.hdr{background:#0a0e1a;border-bottom:2px solid #f0c040;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#f0c040;letter-spacing:2px}
.logo span{color:#06b6d4}
.expbtn{background:linear-gradient(135deg,#b8860b,#ffd700);color:#0a0e1a;border:none;border-radius:6px;padding:8px 18px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;letter-spacing:1px;cursor:pointer}
.workspace{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 48px)}
.sb{background:#0d1120;border-right:1px solid #1e2d4a;padding:12px;overflow-y:auto;max-height:calc(100vh - 48px)}
.sec{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:#f0c040;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #1e2d4a}
.sec:first-child{margin-top:0}
.cl{font-size:9px;font-weight:700;color:#06b6d4;letter-spacing:1px;text-transform:uppercase;margin:6px 0 3px;display:block}
input[type=text],select{width:100%;background:#0a0e1a;border:1px solid #1e2d4a;border-radius:4px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:12px;padding:5px 7px;outline:none}
input:focus,select:focus{border-color:#f0c040}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pb{background:#111827;border:1px solid #1e2d4a;border-radius:6px;padding:8px;margin-bottom:6px}
.pbt{font-family:'Orbitron',sans-serif;font-size:7px;color:#f0c040;letter-spacing:2px;margin-bottom:6px}
.upl{border:2px dashed #1e2d4a;border-radius:5px;padding:7px;text-align:center;cursor:pointer;position:relative;overflow:hidden;margin-top:4px}
.upl:hover{border-color:#f0c040}
.upl input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upl-ic{font-size:16px;display:block}
.upl-tx{font-size:8px;color:#94a3b8}
.upl-prev{width:100%;height:50px;object-fit:contain;border-radius:3px;margin-top:4px;display:none;background:#0a0e1a}
.bgs{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.bsw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.bsw.on,.bsw:hover{border-color:#f0c040}
.ca{display:flex;flex-direction:column;align-items:center;padding:16px 10px;background:#07090f;overflow-y:auto;gap:8px}
.zbar{display:flex;align-items:center;gap:8px;background:#0d1120;border:1px solid #1e2d4a;border-radius:6px;padding:6px 12px;align-self:stretch}
.zbar label{font-size:9px;color:#94a3b8}
.zbar input[type=range]{flex:1;accent-color:#f0c040}
.zbar span{font-size:9px;color:#f0c040;min-width:30px;text-align:right}
canvas{display:block}
#lov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:10px}
#lov.show{display:flex}
.ring{width:44px;height:44px;border:3px solid #1e2d4a;border-top-color:#f0c040;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltx{font-family:'Orbitron',sans-serif;font-size:11px;color:#f0c040;letter-spacing:2px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:2px}
</style>
</head>
<body>
<div id="lov"><div class="ring"></div><div class="ltx">EXPORTING...</div></div>
<header class="hdr">
  <div class="logo">GAME<span>ENCLAVE</span> <span style="color:#94a3b8;font-size:9px;font-weight:400">CLUB PLAYERS</span></div>
  <button class="expbtn" onclick="doExport()">⬇ EXPORT PNG</button>
</header>
<div class="workspace">
<aside class="sb">

  <div class="sec">Text</div>
  <label class="cl">Game Name</label>
  <input type="text" id="g-game" value="FC MOBILE" oninput="draw()">
  <label class="cl">Event Name</label>
  <input type="text" id="g-event" value="TEAM OF THE SEASON" oninput="draw()">
  <label class="cl">Club / League Name</label>
  <input type="text" id="g-club" value="FC BAYERN MÜNCHEN" oninput="draw()">
  <label class="cl">Bottom CTA</label>
  <input type="text" id="g-cta" value="ATTACKERS" oninput="draw()">
  <label class="cl">Watermark</label>
  <input type="text" id="g-wm" value="@game_enclaveofficial" oninput="draw()">

  <div class="sec">Background</div>
  <div class="bgs">
    <div class="bsw on" style="background:radial-gradient(circle,#1e1460,#08091a)" onclick="setBg(0,this)"></div>
    <div class="bsw" style="background:radial-gradient(circle,#0c2461,#04091a)" onclick="setBg(1,this)"></div>
    <div class="bsw" style="background:radial-gradient(circle,#1a0a3a,#050710)" onclick="setBg(2,this)"></div>
    <div class="bsw" style="background:radial-gradient(circle,#0a1f0a,#040d04)" onclick="setBg(3,this)"></div>
    <div class="bsw" style="background:radial-gradient(circle,#1a0505,#0a0202)" onclick="setBg(4,this)"></div>
    <div class="bsw" style="background:radial-gradient(circle,#1a1200,#080600)" onclick="setBg(5,this)"></div>
  </div>

  <div class="sec">Club Logo (optional)</div>
  <div class="upl"><input type="file" accept="image/*" onchange="loadImg(event,'club')"><span class="upl-ic">🏟️</span><span class="upl-tx">Upload</span></div>
  <img class="upl-prev" id="prev-club">

  <div class="sec">Player 1 — Left</div>
  <div class="upl"><input type="file" accept="image/*" onchange="loadImg(event,0)"><span class="upl-ic">📸</span><span class="upl-tx">Upload card image</span></div>
  <img class="upl-prev" id="prev0">

  <div class="sec">Player 2 — Center</div>
  <div class="upl"><input type="file" accept="image/*" onchange="loadImg(event,1)"><span class="upl-ic">📸</span><span class="upl-tx">Upload card image</span></div>
  <img class="upl-prev" id="prev1">

  <div class="sec">Player 3 — Right</div>
  <div class="upl"><input type="file" accept="image/*" onchange="loadImg(event,2)"><span class="upl-ic">📸</span><span class="upl-tx">Upload card image</span></div>
  <img class="upl-prev" id="prev2">

</aside>
<main class="ca">
  <div class="zbar">
    <label>ZOOM</label>
    <input type="range" min="15" max="80" value="42" oninput="setZoom(+this.value)">
    <span id="zv">42%</span>
  </div>
  <canvas id="cvs"></canvas>
</main>
</div>

<script>
const C = document.getElementById('cvs');
const X = C.getContext('2d');

// Canvas size — 1:1 square like reference
const CW = 1080, CH = 1080;

let bgIdx = 0;
const imgs = { club: null, 0: null, 1: null, 2: null };

const BG = [
  ['#1e1460','#08091a'], ['#0c2461','#04091a'], ['#1a0a3a','#050710'],
  ['#0a1f0a','#040d04'], ['#1a0505','#0a0202'], ['#1a1200','#080600']
];

const gv = id => document.getElementById(id)?.value || '';

function setBg(i, el) {
  bgIdx = i;
  document.querySelectorAll('.bsw').forEach(s => s.classList.remove('on'));
  el.classList.add('on'); draw();
}

function setZoom(v) {
  C.style.width  = (CW * v / 100) + 'px';
  C.style.height = (CH * v / 100) + 'px';
  document.getElementById('zv').textContent = v + '%';
}

function loadImg(e, key) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const im = new Image();
    im.onload = () => {
      imgs[key] = im;
      const prev = document.getElementById('prev-' + key);
      if (prev) { prev.src = ev.target.result; prev.style.display = 'block'; }
      draw();
    };
    im.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}

// ── render on any ctx + size ──
function render(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);
  const s = W / 1080;

  // ── BACKGROUND ──
  const [c1, c2] = BG[bgIdx];
  const g = ctx.createRadialGradient(W * 0.3, H * 0.2, 0, W / 2, H / 2, Math.max(W, H) * 0.8);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // ambient blobs
  const b1 = ctx.createRadialGradient(0, 0, 0, 0, 0, W * 0.6);
  b1.addColorStop(0, 'rgba(70,20,150,0.15)'); b1.addColorStop(1, 'transparent');
  ctx.fillStyle = b1; ctx.fillRect(0, 0, W, H);
  const b2 = ctx.createRadialGradient(W, H, 0, W, H, W * 0.5);
  b2.addColorStop(0, 'rgba(20,50,180,0.13)'); b2.addColorStop(1, 'transparent');
  ctx.fillStyle = b2; ctx.fillRect(0, 0, W, H);

  // ── LAYER 1: LIGHT RAYS from top-center ──
  ctx.save();
  const rayOriginX = W / 2, rayOriginY = -H * 0.05;
  const rayCount = 20;
  for (let i = 0; i < rayCount; i++) {
    const angle = (-0.75 + (i / (rayCount - 1)) * 1.5) * Math.PI;
    const rayLen = H * 1.8;
    const spread = W * 0.04;
    const ex = rayOriginX + Math.cos(angle) * rayLen;
    const ey = rayOriginY + Math.sin(angle) * rayLen;
    const rg = ctx.createLinearGradient(rayOriginX, rayOriginY, ex, ey);
    rg.addColorStop(0, 'rgba(180,140,255,0.02)');
    rg.addColorStop(0.4, 'rgba(120,80,220,0.01)');
    rg.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.moveTo(rayOriginX - spread * Math.sin(angle), rayOriginY + spread * Math.cos(angle));
    ctx.lineTo(ex - spread * 8 * Math.sin(angle), ey + spread * 8 * Math.cos(angle));
    ctx.lineTo(ex + spread * 8 * Math.sin(angle), ey - spread * 8 * Math.cos(angle));
    ctx.lineTo(rayOriginX + spread * Math.sin(angle), rayOriginY - spread * Math.cos(angle));
    ctx.closePath();
    ctx.fillStyle = rg;
    ctx.fill();
  }
  ctx.restore();

  // ── LAYER 2: GEOMETRIC LINES / GRID ──
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.strokeStyle = '#a0a8ff';
  ctx.lineWidth = 0.8 * s;

  // Diagonal grid lines
  const lineSpacing = 80 * s;
  for (let x = -H; x < W + H; x += lineSpacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x - H, H); ctx.stroke();
  }
  ctx.restore();

  // Horizontal faint lines
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#8888ff';
  ctx.lineWidth = 0.6 * s;
  for (let y = 0; y < H; y += 60 * s) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // ── LAYER 3: STARS / PARTICLES ──
  ctx.save();
  // Use seeded positions so they're consistent each render
  const starData = [
    [0.08,0.06,1.8],[0.18,0.14,1.2],[0.32,0.04,2.1],[0.45,0.11,1.5],
    [0.61,0.07,1.9],[0.74,0.03,1.3],[0.88,0.09,2.2],[0.95,0.18,1.1],
    [0.04,0.22,1.6],[0.14,0.31,2.0],[0.27,0.19,1.4],[0.38,0.28,1.8],
    [0.52,0.23,2.3],[0.66,0.17,1.2],[0.79,0.26,1.7],[0.91,0.33,1.5],
    [0.06,0.42,1.3],[0.21,0.48,1.9],[0.35,0.38,1.1],[0.48,0.44,2.0],
    [0.58,0.39,1.6],[0.71,0.45,1.4],[0.84,0.41,1.8],[0.96,0.47,1.2],
    [0.11,0.58,2.1],[0.24,0.63,1.5],[0.42,0.55,1.3],[0.55,0.61,1.9],
    [0.68,0.57,1.6],[0.82,0.64,2.0],[0.93,0.59,1.4],[0.03,0.72,1.7],
    [0.16,0.78,1.2],[0.29,0.71,2.2],[0.44,0.76,1.5],[0.57,0.82,1.8],
    [0.72,0.75,1.3],[0.86,0.79,1.9],[0.97,0.73,1.6],[0.09,0.88,1.4],
    [0.22,0.93,1.7],[0.36,0.87,2.0],[0.51,0.91,1.2],[0.64,0.85,1.5],
    [0.77,0.90,1.8],[0.89,0.86,1.3],[0.98,0.92,2.1],[0.15,0.52,1.6],
  ];
  starData.forEach(([rx, ry, r]) => {
    const sx = rx * W, sy = ry * H, sr = r * s;
    const alpha = 0.4 + (r - 1) * 0.3;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
    // Bigger stars get a soft glow
    if (r > 1.8) {
      const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 4);
      sg.addColorStop(0, 'rgba(200,180,255,0.15)');
      sg.addColorStop(1, 'transparent');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(sx, sy, sr * 4, 0, Math.PI * 2); ctx.fill();
    }
  });
  ctx.restore();

  const gameName = gv('g-game');
  const eventName = gv('g-event');
  const clubName = gv('g-club');
  const cta = gv('g-cta');
  const wm = gv('g-wm');

  // ── SECTION 1: HEADER ──
  // EA badge + Game name on same line, centered together

  // Measure game name first
  ctx.font = `900 ${62*s}px 'Orbitron',sans-serif`;
  const gnW = ctx.measureText(gameName).width;
  const badgeR = 28*s;
  const gap = 14*s;
  const totalW = badgeR*2 + gap + gnW;
  const startX = (W - totalW) / 2;
  const headerCY = 60*s;

  // EA badge
  ctx.save();
  ctx.beginPath(); ctx.arc(startX + badgeR, headerCY, badgeR, 0, Math.PI*2);
  const bc = ctx.createRadialGradient(startX+badgeR, headerCY, 0, startX+badgeR, headerCY, badgeR);
  bc.addColorStop(0, '#1a2040'); bc.addColorStop(1, '#0a0e1a');
  ctx.fillStyle = bc; ctx.fill();
  ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 2.5*s; ctx.stroke();
  ctx.font = `900 ${10*s}px 'Orbitron',sans-serif`;
  ctx.fillStyle = '#f0c040'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('EA', startX+badgeR, headerCY - 7*s);
  ctx.fillText('SPORTS', startX+badgeR, headerCY + 6*s);
  ctx.restore();

  // Game name
  ctx.font = `900 ${62*s}px 'Orbitron',sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 12*s;
  ctx.fillText(gameName, startX + badgeR*2 + gap, headerCY);
  ctx.shadowBlur = 0;

  // ── SECTION 2: EVENT NAME ──
  // Split last word big (like TEAM OF THE | SEASON)
  let headerBottom = headerCY + badgeR + 18*s;

  if (eventName) {
    const words = eventName.trim().split(' ');
    const lastWord = words.pop();
    const firstPart = words.join(' ');
    if (firstPart) {
      ctx.font = `400 ${36*s}px 'Bebas Neue',sans-serif`;
      ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6*s;
      ctx.fillText(firstPart.toUpperCase(), W/2, headerBottom);
      headerBottom += 38*s;
    }
    ctx.font = `400 ${88*s}px 'Bebas Neue',sans-serif`;
    ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10*s;
    ctx.fillText(lastWord.toUpperCase(), W/2, headerBottom);
    headerBottom += 92*s;
    ctx.shadowBlur = 0;
  }

  // ── SECTION 3: PLAYER IMAGES ──
  // 3 images side by side, slight vertical padding from header
  // Images just placed as-is — no card frame, no border
  // User uploads the actual FC Mobile card PNG — that IS the card

  const imgY = headerBottom + 8*s;
  const imgPad = 14*s;   // outer padding
  const imgGap = 10*s;   // gap between cards
  const imgW = (W - imgPad*2 - imgGap*2) / 3;
  const imgH = imgW * 1.42; // natural FC card ratio

  for (let i = 0; i < 3; i++) {
    const ix = imgPad + i * (imgW + imgGap);
    const iy = imgY;

    if (imgs[i]) {
      // Draw image as-is, contain fit so full card is visible
      const iw = imgs[i].naturalWidth  || imgs[i].width;
      const ih = imgs[i].naturalHeight || imgs[i].height;
      // Contain: fit entire image inside the slot
      const scale = Math.min(imgW / iw, imgH / ih);
      const dw = iw * scale, dh = ih * scale;
      const dx = ix + (imgW - dw) / 2;
      const dy = iy + (imgH - dh) / 2;
      ctx.drawImage(imgs[i], dx, dy, dw, dh);
    } else {
      // Placeholder box
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1.5*s;
      ctx.beginPath();
      ctx.roundRect(ix, iy, imgW, imgH, 10*s);
      ctx.fill(); ctx.stroke();
      ctx.font = `${60*s}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillText('📸', ix + imgW/2, iy + imgH/2);
      ctx.restore();
    }
  }

  // ── SECTION 4: CLUB NAME + CTA + WATERMARK ──
  const textY = imgY + imgH + 28*s;

  // Club name — white, medium
  if (clubName) {
    // Optional club logo
    ctx.font = `400 ${54*s}px 'Bebas Neue',sans-serif`;
    if (imgs.club) {
      const lsz = 56*s;
      const tw = ctx.measureText(clubName).width;
      const rowW = lsz + 10*s + tw;
      const rowX = (W - rowW) / 2;
      ctx.drawImage(imgs.club, rowX, textY - lsz/2 + 22*s, lsz, lsz);
      ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 8*s;
      ctx.fillText(clubName, rowX + lsz + 10*s, textY + 22*s);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 8*s;
      ctx.fillText(clubName, W/2, textY);
      ctx.shadowBlur = 0;
    }
  }

  // CTA — gold, big
  if (cta) {
    const ctaY = textY + 60*s;
    const ctaG = ctx.createLinearGradient(W*0.2, 0, W*0.8, 0);
    ctaG.addColorStop(0, '#f0c040'); ctaG.addColorStop(1, '#ffd700');
    ctx.font = `400 ${68*s}px 'Bebas Neue',sans-serif`;
    ctx.fillStyle = ctaG; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10*s;
    ctx.fillText(cta.toUpperCase(), W/2, ctaY);
    ctx.shadowBlur = 0;
  }

  if (wm) {
    const wmY = textY + 60*s + 76*s;
    ctx.font = `700 ${15*s}px 'Orbitron',sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(wm, W/2, wmY);
  }
}

function draw() { render(X, CW, CH); }

async function doExport() {
  document.getElementById('lov').classList.add('show');
  await new Promise(r => setTimeout(r, 60));

  // 2x export
  const oc = document.createElement('canvas');
  oc.width = CW * 2; oc.height = CH * 2;
  render(oc.getContext('2d'), CW * 2, CH * 2);

  await new Promise(r => setTimeout(r, 100));

  oc.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `club_players_${Date.now()}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => {
      const w = window.open('', '_blank');
      if (w) {
        w.document.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1">
        <style>*{margin:0;padding:0}body{background:#000;display:flex;flex-direction:column;align-items:center;padding:12px;gap:8px}
        p{color:#fff;font-family:sans-serif;font-size:13px;text-align:center}img{max-width:100%;border-radius:6px}</style></head>
        <body><p>📱 Long press → Save to Photos</p><img src="${url}"></body></html>`);
        w.document.close();
      }
    }, 300);
    setTimeout(() => URL.revokeObjectURL(url), 6000);
    setZoom(+document.querySelector('.zbar input').value);
    document.getElementById('lov').classList.remove('show');
  }, 'image/png');
}

window.addEventListener('load', () => {
  C.width = CW; C.height = CH;
  setZoom(42);
  setTimeout(draw, 200);
  setTimeout(draw, 900);
});
</script>
</body>
</html>
