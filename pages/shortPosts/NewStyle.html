<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC Mobile Post Creator v2 — Game Enclave</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090f; color:#fff; font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; }

/* HEADER */
.hdr { background:linear-gradient(135deg,#0a0e1a,#111827); border-bottom:2px solid #f0c040; padding:12px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:99; }
.hdr-logo { font-family:'Orbitron',sans-serif; font-size:17px; font-weight:900; color:#f0c040; letter-spacing:2px; }
.hdr-logo span { color:#06b6d4; }
.hdr-sub { font-size:11px; color:#94a3b8; letter-spacing:1px; }

/* LAYOUT */
.workspace { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 54px); }

/* SIDEBAR */
.sidebar { background:#0d1120; border-right:1px solid #1e2d4a; padding:16px 14px; overflow-y:auto; max-height:calc(100vh - 54px); }
.sec { font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:3px; color:#f0c040; text-transform:uppercase; margin:0 0 10px; padding-bottom:5px; border-bottom:1px solid #1e2d4a; }
.sec:not(:first-child) { margin-top:18px; }

/* Template buttons */
.tmpl-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:4px; }
.tb { background:#111827; border:2px solid #1e2d4a; border-radius:7px; padding:9px 5px; cursor:pointer; text-align:center; color:#94a3b8; font-family:'Rajdhani',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.5px; transition:all .18s; }
.tb i { font-size:20px; display:block; margin-bottom:3px; font-style:normal; }
.tb:hover,.tb.on { border-color:#f0c040; color:#f0c040; background:#161f34; }

/* Controls */
.cg { margin-bottom:14px; }
.cl { font-size:10px; font-weight:700; color:#06b6d4; letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; display:block; }
input[type=text],input[type=number],select {
  width:100%; background:#0a0e1a; border:1px solid #1e2d4a; border-radius:5px;
  color:#fff; font-family:'Rajdhani',sans-serif; font-size:13px; padding:7px 9px; outline:none; transition:border-color .2s;
}
input:focus,select:focus { border-color:#f0c040; }
.r2 { display:grid; grid-template-columns:1fr 1fr; gap:7px; }

/* Player block */
.pb { background:#111827; border:1px solid #1e2d4a; border-radius:7px; padding:11px; margin-bottom:9px; }
.pbt { font-family:'Orbitron',sans-serif; font-size:9px; color:#f0c040; letter-spacing:2px; margin-bottom:9px; }

/* Upload */
.upl { border:2px dashed #1e2d4a; border-radius:7px; padding:10px; text-align:center; cursor:pointer; position:relative; overflow:hidden; transition:border-color .2s; }
.upl:hover { border-color:#f0c040; }
.upl input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upl-ic { font-size:20px; display:block; }
.upl-tx { font-size:10px; color:#94a3b8; }
.upl-prev { width:100%; height:70px; object-fit:contain; border-radius:5px; margin-top:6px; display:none; background:#0a0e1a; }

/* BG swatches */
.bgs { display:flex; gap:7px; flex-wrap:wrap; }
.bsw { width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:border-color .2s; }
.bsw.on,.bsw:hover { border-color:#f0c040; }

/* Export btn */
.expbtn { width:100%; background:linear-gradient(135deg,#b8860b,#ffd700); color:#0a0e1a; border:none; border-radius:7px; padding:13px; font-family:'Orbitron',sans-serif; font-size:12px; font-weight:900; letter-spacing:2px; cursor:pointer; margin-top:10px; transition:opacity .2s; }
.expbtn:hover { opacity:.88; }

/* CANVAS AREA */
.cnv-area { display:flex; flex-direction:column; align-items:center; padding:24px 16px; background:#07090f; overflow-y:auto; }
.zbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; background:#0d1120; border:1px solid #1e2d4a; border-radius:7px; padding:7px 14px; }
.zbar label { font-size:11px; color:#94a3b8; letter-spacing:1px; }
.zbar input[type=range] { width:110px; accent-color:#f0c040; }
.zbar span { font-size:11px; color:#f0c040; min-width:36px; text-align:right; }
#cvs { display:block; border:1px solid #1e2d4a; border-radius:4px; }

/* Loading */
#lov { display:none; position:fixed; inset:0; background:rgba(7,9,15,.88); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
#lov.show { display:flex; }
.ring { width:52px; height:52px; border:4px solid #1e2d4a; border-top-color:#f0c040; border-radius:50%; animation:sp .8s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }
.ltx { font-family:'Orbitron',sans-serif; font-size:13px; color:#f0c040; letter-spacing:2px; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:#07090f; }
::-webkit-scrollbar-thumb { background:#1e2d4a; border-radius:3px; }
</style>
</head>
<body>

<div id="lov"><div class="ring"></div><div class="ltx">EXPORTING...</div></div>

<header class="hdr">
  <div>
    <div class="hdr-logo">GAME<span>ENCLAVE</span></div>
    <div class="hdr-sub">FC MOBILE POST CREATOR v2</div>
  </div>
</header>

<div class="workspace">
<aside class="sidebar">

  <div class="sec">Template</div>
  <div class="tmpl-grid">
    <button class="tb on" id="tb-pick" onclick="setTmpl('pick')"><i>🗳️</i>PICK FAV</button>
    <button class="tb" id="tb-top3" onclick="setTmpl('top3')"><i>🏆</i>TOP 3</button>
    <button class="tb" id="tb-club" onclick="setTmpl('club')"><i>⚽</i>CLUB PLAYERS</button>
    <button class="tb" id="tb-sbs" onclick="setTmpl('sbs')"><i>🎯</i>START·BENCH·SELL</button>
  </div>

  <div class="sec">Post Settings</div>
  <div class="cg"><label class="cl">Title</label><input type="text" id="g-title" value="TEAM OF THE SEASON" oninput="draw()"></div>
  <div class="cg"><label class="cl">Subtitle</label><input type="text" id="g-sub" value="EA SPORTS FC™ //// TOTS" oninput="draw()"></div>
  <div class="cg"><label class="cl">Bottom Text / CTA</label><input type="text" id="g-cta" value="PICK YOUR FAVOURITE RW" oninput="draw()"></div>
  <div class="cg"><label class="cl">Watermark</label><input type="text" id="g-wm" value="@game_enclaveofficial" oninput="draw()"></div>

  <div class="cg">
    <label class="cl">Background</label>
    <div class="bgs">
      <div class="bsw on" style="background:radial-gradient(circle,#1e1460,#0a0e1a)" onclick="setBg(0,this)"></div>
      <div class="bsw" style="background:radial-gradient(circle,#0c2461,#050d1a)" onclick="setBg(1,this)"></div>
      <div class="bsw" style="background:radial-gradient(circle,#1a0a3a,#050710)" onclick="setBg(2,this)"></div>
      <div class="bsw" style="background:radial-gradient(circle,#0a1f0a,#050d05)" onclick="setBg(3,this)"></div>
      <div class="bsw" style="background:radial-gradient(circle,#1a0505,#100205)" onclick="setBg(4,this)"></div>
    </div>
  </div>

  <!-- Emoji inputs (pick only) -->
  <div id="sec-emoji">
    <div class="sec">Reaction Emojis</div>
    <div class="r2" style="gap:7px;display:grid;grid-template-columns:1fr 1fr 1fr;">
      <div><label class="cl">Left</label><input type="text" id="e1" value="❤️" oninput="draw()"></div>
      <div><label class="cl">Mid</label><input type="text" id="e2" value="😮" oninput="draw()"></div>
      <div><label class="cl">Right</label><input type="text" id="e3" value="👍" oninput="draw()"></div>
    </div>
  </div>

  <!-- Club (club template) -->
  <div id="sec-club" style="display:none">
    <div class="sec">Club</div>
    <div class="cg"><label class="cl">Club Name</label><input type="text" id="club-name" value="FC BAYERN MÜNCHEN" oninput="draw()"></div>
    <div class="cg">
      <label class="cl">Club Logo</label>
      <div class="upl"><input type="file" accept="image/*" onchange="loadImg(event,'club')"><span class="upl-ic">🏟️</span><span class="upl-tx">Upload logo</span></div>
      <img class="upl-prev" id="prev-club">
    </div>
  </div>

  <div class="sec">Players</div>
  <div id="players-panel"></div>

  <button class="expbtn" onclick="exportPng()">⬇ EXPORT 1080×1080 PNG</button>
</aside>

<main class="cnv-area">
  <div class="zbar">
    <label>ZOOM</label>
    <input type="range" min="15" max="90" value="50" oninput="setZoom(+this.value)">
    <span id="zv">50%</span>
  </div>
  <canvas id="cvs" width="1080" height="1080"></canvas>
</main>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const C = document.getElementById('cvs');
const X = C.getContext('2d');
let tmpl = 'pick';
let bgIdx = 0;
let fontsReady = false;

// Per-template player data
const PD = {
  pick: [
    {name:'CHA BUM KUN',rat:'120',pos:'RW',type:'TOTS',flag:'🇰🇷',lg:'',img:null},
    {name:'BEST',       rat:'119',pos:'RW',type:'TOTS',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',lg:'',img:null},
    {name:'OLISE',      rat:'120',pos:'RW',type:'TOTS',flag:'🇫🇷',lg:'🏆',img:null},
  ],
  top3: [
    {name:'HERNÁNDEZ',    rat:'119',pos:'LB',type:'TOTS',rank:'1',flag:'🇫🇷',lg:'',img:null},
    {name:'ROBERTO CARLOS',rat:'117',pos:'LB',type:'ICON',rank:'2',flag:'🇧🇷',lg:'',img:null},
    {name:'NUNO MENDES',  rat:'117',pos:'LB',type:'TOTS',rank:'3',flag:'🇵🇹',lg:'',img:null},
  ],
  club: [
    {name:'DIAZ', rat:'118',pos:'LW',type:'TOTS',flag:'🇨🇴',lg:'⚽',img:null},
    {name:'KANE', rat:'119',pos:'ST',type:'TOTS',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',lg:'⚽',img:null},
    {name:'OLISE',rat:'120',pos:'RW',type:'TOTS',flag:'🇫🇷',lg:'⚽',img:null},
  ],
  sbs: [
    {name:'C. RONALDO',rat:'119',pos:'ST',type:'TOTS',flag:'🇵🇹',lg:'',img:null},
    {name:'HAALAND',   rat:'119',pos:'ST',type:'TOTS',flag:'🇳🇴',lg:'',img:null},
    {name:'KANE',      rat:'119',pos:'ST',type:'TOTS',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',lg:'',img:null},
  ],
};

const CLUB_IMG = {img:null};

const BG_COLORS = [
  ['#1e1460','#0a0e1a'],
  ['#0c2461','#050d1a'],
  ['#1a0a3a','#050710'],
  ['#0a1f0a','#050d05'],
  ['#1a0505','#100205'],
];

const CARD_COLORS = {
  TOTS:  {border1:'#f0c040',border2:'#8b6914',bg1:'#1a1060',bg2:'#0a0e1a'},
  ICON:  {border1:'#d0d8e8',border2:'#6a7490',bg1:'#1a1f30',bg2:'#0a0e1a'},
  HERO:  {border1:'#f0c040',border2:'#b06000',bg1:'#1f0e00',bg2:'#0a0e1a'},
  TOTY:  {border1:'#c084fc',border2:'#7c3aed',bg1:'#2d0a6e',bg2:'#0a0e1a'},
  OTW:   {border1:'#60a5fa',border2:'#1d4ed8',bg1:'#0a1a3a',bg2:'#0a0e1a'},
  POTM:  {border1:'#4ade80',border2:'#15803d',bg1:'#0a2010',bg2:'#0a0e1a'},
};

// ═══════════════════════════════════════════════════════
//  FONT LOAD WAIT
// ═══════════════════════════════════════════════════════
document.fonts.ready.then(() => { fontsReady = true; draw(); });

// ═══════════════════════════════════════════════════════
//  TEMPLATE SWITCH
// ═══════════════════════════════════════════════════════
const CTA_DEF = { pick:'PICK YOUR FAVOURITE RW', top3:'TOP 3 LBs IN FC MOBILE', club:'ATTACKERS', sbs:'START ONE · BENCH ONE · SELL ONE' };
const TTL_DEF = { pick:'TEAM OF THE SEASON', top3:'', club:'TEAM OF THE SEASON', sbs:'' };
const SUB_DEF = { pick:'EA SPORTS FC™ //// TOTS', top3:'', club:'EA SPORTS FC™ //// TOTS', sbs:'' };

function setTmpl(t) {
  tmpl = t;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  document.getElementById('tb-'+t).classList.add('on');
  document.getElementById('g-title').value = TTL_DEF[t];
  document.getElementById('g-sub').value   = SUB_DEF[t];
  document.getElementById('g-cta').value   = CTA_DEF[t];
  document.getElementById('sec-emoji').style.display = t==='pick'?'':'none';
  document.getElementById('sec-club').style.display  = t==='club'?'':'none';
  buildPanel();
  draw();
}

// ═══════════════════════════════════════════════════════
//  PLAYERS PANEL BUILD
// ═══════════════════════════════════════════════════════
function buildPanel() {
  const panel = document.getElementById('players-panel');
  panel.innerHTML = '';
  PD[tmpl].forEach((p,i) => {
    const rankHtml = tmpl==='top3' ? `<div class="cg"><label class="cl">Rank (1-3)</label><input type="number" id="p${i}rank" value="${p.rank||i+1}" min="1" max="3" oninput="sync(${i})"></div>` : '';
    panel.innerHTML += `
    <div class="pb">
      <div class="pbt">PLAYER ${i+1}</div>
      <div class="r2 cg">
        <div><label class="cl">Name</label><input type="text" id="p${i}name" value="${p.name}" oninput="sync(${i})"></div>
        <div><label class="cl">Type</label>
          <select id="p${i}type" onchange="sync(${i})">
            ${['TOTS','ICON','HERO','TOTY','OTW','POTM'].map(v=>`<option value="${v}"${p.type===v?' selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="r2 cg">
        <div><label class="cl">Rating</label><input type="number" id="p${i}rat" value="${p.rat}" min="1" max="200" oninput="sync(${i})"></div>
        <div><label class="cl">Position</label><input type="text" id="p${i}pos" value="${p.pos}" oninput="sync(${i})"></div>
      </div>
      <div class="r2 cg">
        <div><label class="cl">Flag 🏳️</label><input type="text" id="p${i}flag" value="${p.flag}" oninput="sync(${i})"></div>
        <div><label class="cl">League 🏆</label><input type="text" id="p${i}lg" value="${p.lg}" oninput="sync(${i})"></div>
      </div>
      ${rankHtml}
      <label class="cl">Player Photo</label>
      <div class="upl"><input type="file" accept="image/*" onchange="loadImg(event,${i})"><span class="upl-ic">📸</span><span class="upl-tx">Tap to upload</span></div>
      <img class="upl-prev" id="prev${i}">
    </div>`;
  });
}

function sync(i) {
  const p = PD[tmpl][i];
  p.name = document.getElementById(`p${i}name`).value;
  p.rat  = document.getElementById(`p${i}rat`).value;
  p.pos  = document.getElementById(`p${i}pos`).value;
  p.type = document.getElementById(`p${i}type`).value;
  p.flag = document.getElementById(`p${i}flag`).value;
  p.lg   = document.getElementById(`p${i}lg`).value;
  if (tmpl==='top3') p.rank = document.getElementById(`p${i}rank`).value;
  draw();
}

// ═══════════════════════════════════════════════════════
//  IMAGE LOAD
// ═══════════════════════════════════════════════════════
function loadImg(e, idx) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const im = new Image();
    im.onload = () => {
      if (idx === 'club') {
        CLUB_IMG.img = im;
        const p = document.getElementById('prev-club');
        p.src = ev.target.result; p.style.display='block';
      } else {
        PD[tmpl][idx].img = im;
        const p = document.getElementById(`prev${idx}`);
        p.src = ev.target.result; p.style.display='block';
      }
      draw();
    };
    im.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════════════════
//  BG
// ═══════════════════════════════════════════════════════
function setBg(i, el) {
  bgIdx = i;
  document.querySelectorAll('.bsw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  draw();
}

// ═══════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════
function setZoom(v) {
  const scale = v/100;
  C.style.width  = (1080*scale)+'px';
  C.style.height = (1080*scale)+'px';
  document.getElementById('zv').textContent = v+'%';
}

// ═══════════════════════════════════════════════════════
//  CANVAS HELPERS
// ═══════════════════════════════════════════════════════
function gv(id) { return document.getElementById(id)?.value || ''; }

function fillRoundRect(x,y,w,h,r,color) {
  X.beginPath();
  X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r); X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h); X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r); X.arcTo(x,y,x+r,y,r);
  X.closePath();
  if (color) { X.fillStyle=color; X.fill(); }
}

function strokeRoundRect(x,y,w,h,r,color,lw) {
  X.beginPath();
  X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r); X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h); X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r); X.arcTo(x,y,x+r,y,r);
  X.closePath();
  X.strokeStyle=color; X.lineWidth=lw||3; X.stroke();
}

function drawText(txt,x,y,font,color,align='center',maxW) {
  X.font = font;
  X.fillStyle = color;
  X.textAlign = align;
  X.textBaseline = 'alphabetic';
  if (maxW) X.fillText(txt,x,y,maxW);
  else X.fillText(txt,x,y);
}

function drawBg() {
  const [c1,c2] = BG_COLORS[bgIdx];
  const g = X.createRadialGradient(270,200,0,540,540,900);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  X.fillStyle=g; X.fillRect(0,0,1080,1080);
  // Ambient glow blobs
  const g2 = X.createRadialGradient(100,100,0,100,100,500);
  g2.addColorStop(0,'rgba(90,30,180,0.18)'); g2.addColorStop(1,'transparent');
  X.fillStyle=g2; X.fillRect(0,0,1080,1080);
  const g3 = X.createRadialGradient(980,900,0,980,900,400);
  g3.addColorStop(0,'rgba(30,80,200,0.16)'); g3.addColorStop(1,'transparent');
  X.fillStyle=g3; X.fillRect(0,0,1080,1080);
}

// ═══════════════════════════════════════════════════════
//  DRAW CARD  (x, y, w, h, playerObj)
// ═══════════════════════════════════════════════════════
function drawCard(x, y, w, h, p) {
  const cc = CARD_COLORS[p.type] || CARD_COLORS.TOTS;
  const r = 14;

  X.save();
  X.beginPath();
  X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r); X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h); X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r); X.arcTo(x,y,x+r,y,r);
  X.closePath();
  X.clip();

  // Card background gradient
  const bg = X.createLinearGradient(x,y,x,y+h);
  bg.addColorStop(0,cc.bg1); bg.addColorStop(1,cc.bg2);
  X.fillStyle=bg; X.fillRect(x,y,w,h);

  // Player image — full card, object-fit: contain top-center
  const imgH = h - 90; // leave room for header + footer
  const imgY = y + 72;
  if (p.img) {
    const iw = p.img.width, ih = p.img.height;
    const scale = Math.min(w/iw, imgH/ih);
    const dw = iw*scale, dh = ih*scale;
    const dx = x + (w-dw)/2;
    const dy = imgY;
    X.drawImage(p.img, dx, dy, dw, dh);
  } else {
    // placeholder soccer ball
    X.font='72px serif'; X.textAlign='center'; X.textBaseline='middle';
    X.globalAlpha=0.18; X.fillStyle='#fff';
    X.fillText('⚽', x+w/2, imgY+imgH/2);
    X.globalAlpha=1;
  }

  // Bottom gradient fade
  const fade = X.createLinearGradient(0,y+h-90,0,y+h);
  fade.addColorStop(0,'transparent'); fade.addColorStop(1,'rgba(0,0,0,0.92)');
  X.fillStyle=fade; X.fillRect(x,y+h-90,w,90);

  // Top gradient (for rating readability)
  const topFade = X.createLinearGradient(0,y,0,y+85);
  topFade.addColorStop(0,'rgba(0,0,0,0.75)'); topFade.addColorStop(1,'transparent');
  X.fillStyle=topFade; X.fillRect(x,y,w,85);

  // Rating
  X.font=`900 ${Math.round(w*0.22)}px 'Bebas Neue',sans-serif`;
  X.fillStyle='#fff'; X.textAlign='left'; X.textBaseline='top';
  X.shadowColor='rgba(0,0,0,0.8)'; X.shadowBlur=8;
  X.fillText(p.rat, x+12, y+10);

  // Position
  X.font=`700 ${Math.round(w*0.09)}px 'Bebas Neue',sans-serif`;
  X.fillStyle='#aab4c8'; X.textAlign='left'; X.textBaseline='top';
  X.fillText(p.pos, x+13, y+10+Math.round(w*0.22)+2);

  // Card type badge top-right
  X.font=`700 ${Math.round(w*0.065)}px 'Orbitron',sans-serif`;
  X.fillStyle=cc.border1; X.textAlign='right'; X.textBaseline='top';
  X.fillText(p.type, x+w-10, y+12);

  X.shadowBlur=0;

  // Player name
  const nameSize = Math.round(w*0.095);
  X.font=`400 ${nameSize}px 'Bebas Neue',sans-serif`;
  X.fillStyle='#ffffff'; X.textAlign='center'; X.textBaseline='bottom';
  X.shadowColor='rgba(0,0,0,0.9)'; X.shadowBlur=6;
  X.fillText(p.name.toUpperCase(), x+w/2, y+h-28, w-16);

  // Flag + league
  const emojiSize = Math.round(w*0.09);
  X.font=`${emojiSize}px serif`;
  X.textAlign='center'; X.textBaseline='bottom';
  X.shadowBlur=0;
  const flagStr = [p.flag, p.lg].filter(Boolean).join('  ');
  if (flagStr) X.fillText(flagStr, x+w/2, y+h-6);

  X.restore();

  // Border (outside clip)
  const bdr = X.createLinearGradient(x,y,x+w,y+h);
  bdr.addColorStop(0,cc.border1); bdr.addColorStop(0.5,cc.border2); bdr.addColorStop(1,cc.border1);
  strokeRoundRect(x+1.5,y+1.5,w-3,h-3,r,bdr,3.5);

  // Outer glow
  X.save();
  X.shadowColor=cc.border1; X.shadowBlur=22;
  strokeRoundRect(x+1.5,y+1.5,w-3,h-3,r,'transparent',0);
  X.restore();
}

// ═══════════════════════════════════════════════════════
//  DRAW EA HEADER  (for pick + club templates)
// ═══════════════════════════════════════════════════════
function drawEaHeader(title, subtitle) {
  // EA SPORTS badge circle
  X.save();
  X.beginPath(); X.arc(456,58,30,0,Math.PI*2);
  const bc = X.createRadialGradient(456,58,0,456,58,30);
  bc.addColorStop(0,'#1a2040'); bc.addColorStop(1,'#0a0e1a');
  X.fillStyle=bc; X.fill();
  X.strokeStyle='#f0c040'; X.lineWidth=2; X.stroke();
  X.font="900 10px 'Orbitron',sans-serif";
  X.fillStyle='#f0c040'; X.textAlign='center'; X.textBaseline='middle';
  X.fillText('EA',456,52); X.fillText('SPORTS',456,64);
  X.restore();

  // FC MOBILE
  X.font="900 56px 'Orbitron',sans-serif";
  X.fillStyle='#ffffff'; X.textAlign='center'; X.textBaseline='top';
  X.shadowColor='rgba(0,0,0,0.6)'; X.shadowBlur=10;
  X.fillText('FC MOBILE', 540, 32);
  X.shadowBlur=0;

  // Title lines — split on last word
  if (title) {
    const words = title.trim().split(' ');
    const lastWord = words.pop();
    const firstPart = words.join(' ');
    if (firstPart) {
      X.font="400 44px 'Bebas Neue',sans-serif";
      X.fillStyle='#ffffff'; X.textAlign='center'; X.textBaseline='top';
      X.shadowColor='rgba(0,0,0,0.7)'; X.shadowBlur=8;
      X.fillText(firstPart.toUpperCase(), 540, 100);
    }
    X.font="400 98px 'Bebas Neue',sans-serif";
    X.fillStyle='#ffffff'; X.textAlign='center'; X.textBaseline='top';
    X.shadowColor='rgba(0,0,0,0.8)'; X.shadowBlur=12;
    X.fillText(lastWord.toUpperCase(), 540, firstPart ? 140 : 100);
    X.shadowBlur=0;
  }

  // Subtitle
  if (subtitle) {
    X.font="700 16px 'Rajdhani',sans-serif";
    X.fillStyle='#94a3b8'; X.textAlign='center'; X.textBaseline='top';
    X.letterSpacing='4px';
    X.fillText(subtitle, 540, title ? 252 : 160);
  }
}

// ═══════════════════════════════════════════════════════
//  DRAW WATERMARK
// ═══════════════════════════════════════════════════════
function drawWatermark(wm) {
  if (!wm) return;
  X.font="700 18px 'Orbitron',sans-serif";
  X.fillStyle='rgba(255,255,255,0.28)'; X.textAlign='center'; X.textBaseline='bottom';
  X.fillText(wm, 540, 1068);
}

// ═══════════════════════════════════════════════════════
//  TEMPLATE: PICK FAVOURITE
// ═══════════════════════════════════════════════════════
function drawPick() {

  drawEaHeader(title, sub);

// ═══════════════════════════════════════════════════════
//  TEMPLATE: TOP 3 PODIUM
// ═══════════════════════════════════════════════════════
function drawTop3() {
  drawBg();
  const cta = gv('g-cta'), wm = gv('g-wm');

  // EA badge
  X.save();
  X.beginPath(); X.arc(504,58,28,0,Math.PI*2);
  const bc = X.createRadialGradient(504,58,0,504,58,28);
  bc.addColorStop(0,'#1a2040'); bc.addColorStop(1,'#0a0e1a');
  X.fillStyle=bc; X.fill(); X.strokeStyle='#f0c040'; X.lineWidth=2; X.stroke();
  X.font="900 9px 'Orbitron',sans-serif";
  X.fillStyle='#f0c040'; X.textAlign='center'; X.textBaseline='middle';
  X.fillText('EA',504,52); X.fillText('SPORTS',504,63); X.restore();

  // Soccer ball
  X.font='38px serif'; X.textAlign='center'; X.textBaseline='middle';
  X.fillText('⚽',576,58);

  // CTA title gradient text
  const grd = X.createLinearGradient(200,0,880,0);
  grd.addColorStop(0,'#06b6d4'); grd.addColorStop(0.5,'#c084fc'); grd.addColorStop(1,'#06b6d4');
  X.font="900 66px 'Orbitron',sans-serif";
  X.fillStyle=grd; X.textAlign='center'; X.textBaseline='top';
  X.shadowColor='rgba(0,0,0,0.5)'; X.shadowBlur=10;
  // Scale down if too wide
  const ctaMeasure = X.measureText(cta);
  if (ctaMeasure.width > 900) {
    X.font="900 48px 'Orbitron',sans-serif";
  }
  X.fillText(cta, 540, 110);
  X.shadowBlur=0;

  // Sort players by rank
  const sorted = [...PD.top3].sort((a,b)=>parseInt(a.rank||1)-parseInt(b.rank||1));
  const p1 = sorted.find(p=>p.rank=='1')||sorted[0];
  const p2 = sorted.find(p=>p.rank=='2')||sorted[1];
  const p3 = sorted.find(p=>p.rank=='3')||sorted[2];

  // Layout: [2nd, 1st, 3rd]
  const layout = [
    {p:p2, x:30,  podH:80,  cardW:300, cardH:340, podColor:'#374151', numColor:'#9ca3af', num:'2'},
    {p:p1, x:380, podH:120, cardW:320, cardH:380, podColor:'#92400e', numColor:'#f0c040', num:'1'},
    {p:p3, x:730, podH:60,  cardW:300, cardH:320, podColor:'#78350f', numColor:'#cd7c2a', num:'3'},
  ];

  layout.forEach(({p,x,podH,cardW,cardH,podColor,numColor,num}) => {
    const cardY = 1080 - podH - cardH - 20;
    drawCard(x, cardY, cardW, cardH, p);

    // Podium platform
    const podY = 1080 - podH - 20;
    const pg = X.createLinearGradient(0,podY,0,podY+podH);
    pg.addColorStop(0,podColor); pg.addColorStop(1,'rgba(0,0,0,0.4)');
    fillRoundRect(x, podY, cardW, podH, 6, pg);
    strokeRoundRect(x, podY, cardW, podH, 6, numColor, 2);

    // Rank number
    X.font=`900 ${Math.round(podH*0.55)}px 'Bebas Neue',sans-serif`;
    X.fillStyle=numColor; X.textAlign='center'; X.textBaseline='middle';
    X.shadowColor='rgba(0,0,0,0.8)'; X.shadowBlur=8;
    X.fillText(num, x+cardW/2, podY+podH/2);
    X.shadowBlur=0;
  });

  drawWatermark(wm);
}

// ═══════════════════════════════════════════════════════
//  TEMPLATE: CLUB PLAYERS

  X.shadowColor='rgba(0,0,0,0.8)'; X.shadowBlur=12;

}

// ═══════════════════════════════════════════════════════
//  TEMPLATE: START · BENCH · SELL
// ═══════════════════════════════════════════════════════
function drawSbs() {
  drawBg();
  const cta = gv('g-cta'), wm = gv('g-wm');

  // Header — EA + FC MOBILE
  X.save();
  X.beginPath(); X.arc(456,58,28,0,Math.PI*2);
  const bc = X.createRadialGradient(456,58,0,456,58,28);
  bc.addColorStop(0,'#1a2040'); bc.addColorStop(1,'#0a0e1a');
  X.fillStyle=bc; X.fill(); X.strokeStyle='#f0c040'; X.lineWidth=2; X.stroke();
  X.font="900 9px 'Orbitron',sans-serif";
  X.fillStyle='#f0c040'; X.textAlign='center'; X.textBaseline='middle';
  X.fillText('EA',456,52); X.fillText('SPORTS',456,63); X.restore();

  X.font="900 56px 'Orbitron',sans-serif";
  X.fillStyle='#fff'; X.textAlign='center'; X.textBaseline='top';
  X.shadowColor='rgba(0,0,0,0.6)'; X.shadowBlur=10;
  X.fillText('FC MOBILE', 540, 32);
  X.shadowBlur=0;

  // Cards
  const players = PD.sbs;
  const cardW = 306, cardH = 400;
  const totalW = cardW*3 + 24*2;
  const startX = (1080-totalW)/2;
  const cardY = 130;
  players.forEach((p,i) => drawCard(startX+i*(cardW+24), cardY, cardW, cardH, p));

  // Labels under each card
  const labels = ['START','BENCH','SELL'];
  const lColors = ['#4ade80','#fbbf24','#f87171'];
  const lBgs    = ['rgba(74,222,128,0.14)','rgba(251,191,36,0.14)','rgba(248,113,113,0.14)'];

  labels.forEach((lbl,i) => {
    const cx = startX + i*(cardW+24) + cardW/2;
    const ly = cardY + cardH + 18;
    const lw = 180, lh = 50;
    fillRoundRect(cx-lw/2, ly, lw, lh, 8, lBgs[i]);
    strokeRoundRect(cx-lw/2, ly, lw, lh, 8, lColors[i], 2.5);
    X.font="400 28px 'Bebas Neue',sans-serif";
    X.fillStyle=lColors[i]; X.textAlign='center'; X.textBaseline='middle';
    X.fillText(lbl, cx, ly+lh/2);
  });

  // CTA bottom
  X.font="400 42px 'Bebas Neue',sans-serif";
  X.fillStyle='#ffffff'; X.textAlign='center'; X.textBaseline='bottom';
  X.shadowColor='rgba(0,0,0,0.8)'; X.shadowBlur=12;
  X.fillText(cta.toUpperCase(), 540, 1042);
  X.shadowBlur=0;
  drawWatermark(wm);
}

// ═══════════════════════════════════════════════════════
//  MAIN DRAW ROUTER
// ═══════════════════════════════════════════════════════
function draw() {
  X.clearRect(0,0,1080,1080);
  if (tmpl==='pick')  drawPick();
  if (tmpl==='top3')  drawTop3();
  if (tmpl==='club')  drawClub();
  if (tmpl==='sbs')   drawSbs();
}

// ═══════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════
async function exportPng() {
  document.getElementById('lov').classList.add('show');

  // Save current display size, render at full 1080
  const prevW = C.style.width, prevH = C.style.height;
  C.style.width='1080px'; C.style.height='1080px';

  await new Promise(r=>setTimeout(r,80));
  draw(); // ensure drawn at full res
  await new Promise(r=>setTimeout(r,120));

  C.toBlob(blob => {
    if (!blob) { alert('Export failed. Try screenshot.'); document.getElementById('lov').classList.remove('show'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `gameenclave_${tmpl}_${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);

    // Mobile fallback — open in new tab
    setTimeout(()=>{
      const w = window.open();
      if(w){ w.document.write(`<html><body style="margin:0;background:#000;text-align:center"><p style="color:#fff;font-family:sans-serif;padding:10px;font-size:14px">📱 Long press image → Save to Gallery</p><img src="${url}" style="max-width:100%;display:block;margin:0 auto"></body></html>`); w.document.close(); }
    },400);

    // Restore display zoom
    const zoom = document.querySelector('.zbar input[type=range]').value;
    setZoom(+zoom);
    document.getElementById('lov').classList.remove('show');
  },'image/png');
}
