```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FC Mobile — Head to Head</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
  --gold: #d4a843;
  --gold-light: #f0c96a;
  --gold-dim: rgba(212,168,67,0.15);
  --dark: #080b10;
  --dark2: #0d1219;
  --dark3: #141b27;
  --green: #00e676;
  --red: #ff4444;
  --accent-l: #4fc3f7;
  --accent-r: #ff6b35;
  --text: #e8edf5;
  --muted: #5a6a7e;
}

* { box-sizing:border-box;margin:0;padding:0; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

#card {
  width:100%;
  max-width:860px;
  border-radius:18px;
  overflow:hidden;
  background:var(--dark2);
}

.players-row {
  display:grid;
  grid-template-columns:1fr 1fr;
}

.player-col {
  text-align:center;
  padding:20px;
}

.img-wrapper {
  width:180px;
  height:200px;
  margin:auto;
  cursor:pointer;
}

.img-wrapper img {
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center; /* ✅ ADD THIS LINE */
  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.65));
  transition: transform .3s;
  display: block;
}

.player-name, .meta-tag, .stat-num, .ovr-num {
  caret-color: var(--gold);
}

.stat-row {
  display:flex;
  gap:6px;
  align-items:center;
}

.bar-wrap {
  flex:1;
  height:4px;
  background:#222;
}

.bar-fill {
  height:100%;
}

.stat-num.win {
  color:var(--green);
  text-shadow:0 0 8px rgba(0,230,118,0.6);
}
.stat-num.lose {
  color:var(--red);
  opacity:0.7;
}

button {
  margin:10px;
  padding:8px 16px;
  cursor:pointer;
}
</style>
</head>

<body>

<button id="dlBtn" onclick="downloadCard()">⬇ Download</button>

<div id="card">

<div class="players-row">

<div class="player-col" id="col-L">
<div class="img-wrapper" onclick="triggerUpload('upL',event)">
<img id="imgL">
<input type="file" id="upL" hidden onchange="loadImg(event,'imgL')">
</div>

<div contenteditable class="player-name">PLAYER ONE</div>
<div contenteditable class="meta-tag">ST</div>
<div contenteditable id="ovrNumL" class="ovr-num" oninput="onOvrInput('L')">88</div>
<div id="statsL"></div>
</div>

<div class="player-col" id="col-R">
<div class="img-wrapper" onclick="triggerUpload('upR',event)">
<img id="imgR">
<input type="file" id="upR" hidden onchange="loadImg(event,'imgR')">
</div>

<div contenteditable class="player-name">PLAYER TWO</div>
<div contenteditable class="meta-tag">CAM</div>
<div contenteditable id="ovrNumR" class="ovr-num" oninput="onOvrInput('R')">91</div>
<div id="statsR"></div>
</div>

</div>
</div>

<script>
const STATS=['PAC','SHO','PAS','DRI','DEF','PHY'];

function buildStats(){
 ['L','R'].forEach(side=>{
  const block=document.getElementById('stats'+side);
  block.innerHTML='';

  STATS.forEach(stat=>{
    const val=Math.floor(Math.random()*100);
    block.innerHTML+=`
    <div class="stat-row">
      <div>${stat}</div>
      <div class="bar-wrap">
        <div class="bar-fill" id="bar${side}${stat}" style="width:${val}%"></div>
      </div>
      <div contenteditable class="stat-num" id="num${side}${stat}"
      oninput="onStatEdit('${side}','${stat}',this)">${val}</div>
    </div>`;
  });
 });
 highlight();
}

let highlightTimeout;
function debounceHighlight(){
 clearTimeout(highlightTimeout);
 highlightTimeout=setTimeout(highlight,100);
}

function onStatEdit(side,stat,el){
 let clean=el.textContent.replace(/[^\d]/g,'');
 clean=clean.slice(0,3);
 el.textContent=clean;

 const val=clean==''?0:parseInt(clean);
 document.getElementById('bar'+side+stat).style.width=Math.min(100,val)+'%';

 debounceHighlight();
}

function highlight(){
 STATS.forEach(stat=>{
  const l=parseInt(document.getElementById('numL'+stat).textContent)||0;
  const r=parseInt(document.getElementById('numR'+stat).textContent)||0;

  const lEl=document.getElementById('numL'+stat);
  const rEl=document.getElementById('numR'+stat);

  lEl.className='stat-num';
  rEl.className='stat-num';

  if(l>r){lEl.classList.add('win');rEl.classList.add('lose');}
  else if(r>l){rEl.classList.add('win');lEl.classList.add('lose');}
 });
}

function loadImg(e, id) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  const img = document.getElementById(id);

  if (img) {
    img.onload = () => {
      URL.revokeObjectURL(url);
      img.dataset.loaded = "true"; // ✅ mark as loaded
    };
    img.dataset.loaded = "false";
    img.src = url;
    img.style.objectFit = 'contain';
  }
}

function triggerUpload(id,e){
 e?.stopPropagation();
 document.getElementById(id).click();
}

function onOvrInput(side){}

async function downloadCard(){
  const btn = document.getElementById('dlBtn'); // ✅ safer than event.target
  btn.textContent = "⏳ Generating...";
  btn.disabled = true;

  // ✅ check if images loaded
  const imgs = [document.getElementById('imgL'), document.getElementById('imgR')];
  for (let img of imgs) {
   if (img.src && img.dataset.loaded !== "true"){
      alert("Please wait for images to load properly");
      btn.textContent = "⬇ Download";
      btn.disabled = false;
      return;
    }
  }

  // ✅ small delay ensures rendering is complete
  await new Promise(res => setTimeout(res, 300));

  try{
    const canvas = await html2canvas(document.getElementById('card'), {
      scale: 3, // 🔥 better quality
      useCORS: true,
      backgroundColor: "#0d1219"
    });

    const a = document.createElement('a');
    a.download = "fcmobile.png";
    a.href = canvas.toDataURL("image/png");
    a.click();

  }catch(err){
    console.error(err);
    btn.textContent = "❌ Failed";
    setTimeout(()=>btn.textContent="⬇ Download",2000);
  }

  btn.textContent = "⬇ Download";
  btn.disabled = false;
}

buildStats();
</script>

</body>
</html>
```
